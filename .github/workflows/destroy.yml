name: 3. Destroy Infrastructure (MANUAL ONLY)

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm you want to tear down all AWS infrastructure'
        required: true
        default: ""

env:
  AWS_REGION: us-east-1

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Confirm destroy intent
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
            echo "❌ You must type 'destroy' to proceed."
            exit 1
          fi
          echo "⚠️ Confirmed — proceeding with teardown..."

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # -------------------------------------------------------
      # STEP 1: Empty ECR first — Terraform cannot delete a repo
      # that still has images in it, so we pre-empty it
      # -------------------------------------------------------
      - name: Empty ECR repository
        run: |
          REPO_NAME="imagify-repo"
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name $REPO_NAME \
            --query 'imageIds[*]' \
            --output json 2>/dev/null || echo "[]")

          if [ "$IMAGE_IDS" != "[]" ]; then
            aws ecr batch-delete-image \
              --repository-name $REPO_NAME \
              --image-ids "$IMAGE_IDS"
            echo "✅ ECR images deleted"
          else
            echo "ℹ️ No images to delete"
          fi

      # -------------------------------------------------------
      # STEP 2: Terraform destroy WHILE the state file still
      # exists in S3 — this is the critical fix.
      # The old workflow emptied S3 BEFORE this step which wiped
      # the state and made Terraform think nothing existed.
      # -------------------------------------------------------
      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var "mongodb_url=${{ secrets.MONGODB_URL }}" \
            -var "clerk_publishable_key=${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            -var "clerk_secret_key=${{ secrets.CLERK_SECRET_KEY }}" \
            -var "cloudinary_api_key=${{ secrets.CLOUDINARY_API_KEY }}" \
            -var "cloudinary_api_secret=${{ secrets.CLOUDINARY_API_SECRET }}" \
            -var "stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
            -var "stripe_publishable_key=${{ secrets.STRIPE_PUBLISHABLE_KEY }}"

      - name: Cleanup SSM infra params
        run: |
          for param in ecr_repository_url ecs_cluster ecs_service; do
            aws ssm delete-parameter \
              --name "/imagify/dev/$param" \
              --region ${{ env.AWS_REGION }} || echo "ℹ️ $param already gone"
          done
          echo "✅ All done — infrastructure fully destroyed"