name: Deploy Imagify to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPO_NAME: imagify-repo
  IMAGE_TAG: latest

jobs:
  deploy:
    name: Build & Deploy ECS Fargate
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }} .

      # 5. Tag Docker image with ECR URI
      - name: Tag Docker image
        run: |
          ECR_URI=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPO_NAME }} --query 'repositories[0].repositoryUri' --output text)
          echo "ECR_URI=$ECR_URI" >> $GITHUB_ENV
          docker tag ${{ env.ECR_REPO_NAME }}:${{ env.IMAGE_TAG }} $ECR_URI:${{ env.IMAGE_TAG }}

      # 6. Push Docker image to ECR
      - name: Push Docker image
        run: docker push $ECR_URI:${{ env.IMAGE_TAG }}

      # 7. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # 8. Export Terraform variables from GitHub Secrets
      - name: Set Terraform variables
        run: |
          export TF_VAR_mongodb_url="${{ secrets.MONGODB_URL }}"
          export TF_VAR_clerk_publishable_key="${{ secrets.CLERK_PUBLISHABLE_KEY }}"
          export TF_VAR_clerk_secret_key="${{ secrets.CLERK_SECRET_KEY }}"
          export TF_VAR_cloudinary_api_key="${{ secrets.CLOUDINARY_API_KEY }}"
          export TF_VAR_cloudinary_api_secret="${{ secrets.CLOUDINARY_API_SECRET }}"
          export TF_VAR_stripe_secret_key="${{ secrets.STRIPE_SECRET_KEY }}"
          export TF_VAR_stripe_publishable_key="${{ secrets.STRIPE_PUBLISHABLE_KEY }}"

      # 9. Terraform Init
      - name: Terraform Init
        run: terraform init

      # 10. Terraform Plan
      - name: Terraform Plan
        run: terraform plan

      # 11. Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # 12. Get ECS service info
      - name: Get ECS service info
        run: |
          ECS_SERVICE=$(terraform output -raw aws_ecs_service)
          ECS_CLUSTER=$(terraform output -raw aws_ecs_cluster)
          echo "ECS_SERVICE=$ECS_SERVICE" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$ECS_CLUSTER" >> $GITHUB_ENV

      # 13. Force ECS service update (ensure new Docker image deploys)
      - name: Force ECS service update
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
